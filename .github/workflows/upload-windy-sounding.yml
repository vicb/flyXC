name: 'Upload the flyXC Soundings plugin'
run-name: Upload to Windy by @${{ github.actor }}

on:
  workflow_dispatch:

jobs:
  publish-plugin:
    runs-on: ubuntu-latest
    env:
      WINDY_API_KEY: '${{ secrets.WINDY_API_KEY }}'
    steps:
      - uses: actions/checkout@v7
        with:
          # We must fetch at least the immediate parents so that if this is
          # a pull request then we can checkout the head.
          fetch-depth: 2
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm nx upload:prepare windy-plugin-fxc-soundings
      - name: Publish Plugin
        run: pnpm nx upload windy-plugin-fxc-soundings
